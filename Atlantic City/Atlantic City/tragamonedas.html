<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tragamonedas Elite - Atlantic City</title>
  <link rel="stylesheet" href="estilos.css">
  <style>
    .slots-container { text-align: center; padding: 90px 20px 50px; max-width: 800px; margin: 0 auto; }
    
    .machine-area {
        background: rgba(16, 14, 28, 0.8); 
        padding: 40px; 
        border-radius: 20px; 
        border: 2px solid var(--gold);
        box-shadow: 0 0 30px rgba(201,168,76,0.2), inset 0 0 20px rgba(0,0,0,0.8);
        margin: 30px auto;
        display: inline-block;
    }

    .slots { 
        display: flex; 
        justify-content: center; 
        gap: 15px; 
        background: #000;
        padding: 20px;
        border-radius: 10px;
        border: 4px solid #333;
    }
    
    /* Estilo de los rodillos físicos */
    .reel { 
        width: 100px; 
        height: 120px; 
        background: #fafaf8; 
        border-radius: 8px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 4.5rem; 
        box-shadow: inset 0 10px 15px rgba(0,0,0,0.5), inset 0 -10px 15px rgba(0,0,0,0.5);
        overflow: hidden;
    }

    .spinning {
        filter: blur(4px);
        transform: translateY(5px);
    }

    .bet-area { margin-top: 25px; display: flex; gap: 15px; align-items: center; justify-content: center; }
    .bet-input { background: rgba(0,0,0,0.5); border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 5px; width: 100px; text-align: center; font-size: 1.1rem; }
    
    .result { font-family: 'Cinzel', serif; font-size: 1.8rem; margin-top: 25px; color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); min-height: 40px;}
    
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <button class="logo-btn" onclick="window.location.href='paginaprincipalcliente.html'">
        <h2>Atlantic City</h2>
      </button>
    </div>
    <div class="nav-btns">
        <div style="background: var(--gold-glow-soft); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold);">
            <span style="color: var(--gold); font-size: 0.9rem;">Saldo: </span>
            <strong id="saldoDisplay" style="color: white;">S/ 0.00</strong>
        </div>
    </div>
  </nav>

  <div class="slots-container animate-in">
    <h1 style="color: var(--gold); font-family: 'Cinzel Decorative', serif; margin-bottom: 5px;">TRAGAMONEDAS VIP</h1>
    <p style="color: var(--text-muted);">Tres iguales pagan x10 la apuesta</p>

    <div class="machine-area">
        <div class="slots">
            <div class="reel" id="reel1">🍒</div>
            <div class="reel" id="reel2">🍋</div>
            <div class="reel" id="reel3">🍇</div>
        </div>
        
        <div class="bet-area">
            <span style="color: white;">Apuesta (S/):</span>
            <input type="number" id="apuesta" class="bet-input" min="1" value="5" />
            <button class="btn-primary" id="btnSpin" onclick="spin()">🎰 Girar</button>
        </div>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script>
    const symbols = ['🍒', '🍋', '🍇', '🍊', '🍉', '⭐', '💎'];
    let saldo = 0;
    const API_URL = 'http://localhost:3000/api';
    const sessionData = sessionStorage.getItem('clienteLogged');
    const cliente = sessionData ? JSON.parse(sessionData) : { nombre: "Invitado", saldo: 100, dni: "0" };

    // --- SINCRONIZACIÓN DE SALDO ---
    function updateSaldoUI() {
      document.getElementById('saldoDisplay').textContent = `S/ ${Number(saldo).toFixed(2)}`;
    }

    async function syncSaldoHost(nuevoSaldo) {
      saldo = nuevoSaldo;
      updateSaldoUI();
      cliente.saldo = nuevoSaldo;
      sessionStorage.setItem('clienteLogged', JSON.stringify(cliente));

      if (cliente.dni !== "0") {
          try {
              await fetch(`${API_URL}/clientes/${cliente.dni}/saldo`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ saldo: nuevoSaldo })
              });
          } catch (e) { console.warn("Servidor offline, saldo guardado localmente."); }
      }
    }

    function registrar(apuesta, ganancia, resultado) {
        if (window.opener && window.opener.registrarJuego) {
            window.opener.registrarJuego('Tragamonedas', apuesta, ganancia, resultado);
        }
    }

    // --- LÓGICA DE TRAGAMONEDAS ---
    async function spin() {
      const apuesta = parseInt(document.getElementById('apuesta').value);
      if (isNaN(apuesta) || apuesta < 1) {
          alert("Ingresa un monto válido.");
          return;
      }
      if (apuesta > saldo) {
        alert("¡Saldo insuficiente! Por favor, recarga tu cuenta.");
        return;
      }

      // Cobrar y bloquear
      await syncSaldoHost(saldo - apuesta);
      const btnSpin = document.getElementById('btnSpin');
      btnSpin.disabled = true;
      document.getElementById('result').textContent = 'Girando...';

      const reels = ['reel1', 'reel2', 'reel3'];
      let results = [];
      let reelsFinished = 0; // Contador de columnas detenidas

      reels.forEach((reelId, index) => {
        const reel = document.getElementById(reelId);
        reel.classList.add('spinning'); // Efecto visual de giro
        
        let spins = 0;
        // Cada columna gira más tiempo que la anterior (15, 25, 35 giros)
        const maxSpins = 15 + (index * 10); 

        const interval = setInterval(() => {
          reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
          spins++;
          
          if (spins >= maxSpins) {
            clearInterval(interval);
            reel.classList.remove('spinning');
            
            const finalSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            reel.textContent = finalSymbol;
            results[index] = finalSymbol;
            
            reelsFinished++;
            
            // Si ya terminaron de girar las 3 columnas, revisamos el premio
            if (reelsFinished === 3) {
              checkWin(results, apuesta);
              btnSpin.disabled = false;
            }
          }
        }, 100); // 100ms de velocidad por fotograma
      });
    }

    async function checkWin(results, apuesta) {
      const resultDiv = document.getElementById('result');
      let ganancia = 0;
      let mensaje = '';
      let resultadoStatus = 'Perdida';

      // Validación de premio (3 símbolos iguales)
      if (results[0] === results[1] && results[1] === results[2]) {
        // Premio extra si tocan 3 diamantes
        if (results[0] === '💎') {
            ganancia = apuesta * 50;
            mensaje = `¡SUPER JACKPOT DIAMANTE! Ganaste S/ ${ganancia}`;
        } else {
            ganancia = apuesta * 10;
            mensaje = `¡JACKPOT! Ganaste S/ ${ganancia}`;
        }
        resultadoStatus = 'Ganada';
      } else {
        mensaje = 'Sigue intentando...';
      }

      resultDiv.textContent = mensaje;
      
      // Pagar si ganó
      if (ganancia > 0) {
          await syncSaldoHost(saldo + ganancia);
      }
      
      // Registrar jugada
      registrar(apuesta, ganancia, resultadoStatus);
    }

    // --- CARGA INICIAL ---
    window.onload = () => {
      saldo = cliente.saldo;
      updateSaldoUI();
      if (cliente.dni !== "0") {
        fetch(`${API_URL}/clientes`)
          .then(r => r.json())
          .then(data => {
            const c = data.find(u => u.dni === cliente.dni);
            if (c) { saldo = c.saldo; updateSaldoUI(); }
          }).catch(() => console.log("Offline mode"));
      }
    };
  </script>
</body>
</html>
